apiVersion: apps/v1
kind: Deployment
metadata:
  name: codedebt-api
  labels:
    app: codedebt
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: codedebt
      component: api
  template:
    metadata:
      labels:
        app: codedebt
        component: api
    spec:
      containers:
        - name: api
          image: ghcr.io/codedebt/guardian:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: codedebt-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: codedebt-api
spec:
  selector:
    app: codedebt
    component: api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: codedebt-worker
  labels:
    app: codedebt
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: codedebt
      component: worker
  template:
    metadata:
      labels:
        app: codedebt
        component: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/codedebt/guardian:latest
          command: ["celery", "-A", "workers.celery_app", "worker", "--loglevel=info", "-Q", "analysis,embeddings,pr"]
          envFrom:
            - secretRef:
                name: codedebt-secrets
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: codedebt-worker-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: codedebt-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: codedebt-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.codedebt.dev
      secretName: codedebt-tls
  rules:
    - host: api.codedebt.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: codedebt-api
                port:
                  number: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: codedebt-api-pdb
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: codedebt
      component: api
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-gateway-internal-only
spec:
  podSelector:
    matchLabels:
      component: ai-gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: codedebt
