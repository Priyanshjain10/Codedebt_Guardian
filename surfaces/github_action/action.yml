name: "CodeDebt Guardian"
description: "Detect technical debt in your codebase and block high-debt PRs"

branding:
  color: red
  icon: shield

inputs:
  repo-token:
    description: "GitHub token for repo access"
    required: true
  groq-api-key:
    description: "Groq API key (free tier: 14,400 req/day on Llama 3.3 70B)"
    required: false
    default: ""
  fail-on-critical:
    description: "Fail the workflow if CRITICAL issues are found"
    required: false
    default: "false"
  min-score:
    description: "Minimum TDR health score to pass (0-100, default 0 = never fail on score)"
    required: false
    default: "0"
  max-debt-dollars:
    description: "Maximum debt cost in USD before failing (default 500)"
    required: false
    default: "500"

outputs:
  debt-score:
    description: "TDR health grade (A/B/C/D/F)"
    value: ${{ steps.scan.outputs.debt-score }}
  critical-count:
    description: "Number of CRITICAL severity issues"
    value: ${{ steps.scan.outputs.critical-count }}
  high-count:
    description: "Number of HIGH severity issues"
    value: ${{ steps.scan.outputs.high-count }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install dependencies
      shell: bash
      run: pip install -r ${{ github.action_path }}/../../requirements.txt --quiet

    - name: Run CodeDebt scan
      id: scan
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.repo-token }}
        GROQ_API_KEY: ${{ inputs.groq-api-key }}
        CODEDEBT_MAX_PR_DOLLARS: ${{ inputs.max-debt-dollars }}
      run: |
        cd ${{ github.action_path }}/../..
        python main.py \
          --repo "${{ github.event.repository.html_url }}" \
          --branch "${{ github.head_ref || github.ref_name }}" \
          --format json \
          --save \
          2>&1 | tee /tmp/codedebt_output.txt || true

        # Extract metrics from saved report
        REPORT=$(ls -t debt_report_*.json 2>/dev/null | head -1)
        if [ -n "$REPORT" ]; then
          GRADE=$(python3 -c "import json; d=json.load(open('$REPORT')); print(d.get('tdr',{}).get('grade','N/A'))" 2>/dev/null || echo "N/A")
          CRITICAL=$(python3 -c "import json; d=json.load(open('$REPORT')); print(d.get('summary',{}).get('critical',0))" 2>/dev/null || echo "0")
          HIGH=$(python3 -c "import json; d=json.load(open('$REPORT')); print(d.get('summary',{}).get('high',0))" 2>/dev/null || echo "0")
          TOTAL=$(python3 -c "import json; d=json.load(open('$REPORT')); print(d.get('summary',{}).get('total_issues',0))" 2>/dev/null || echo "0")
          COST=$(python3 -c "import json; d=json.load(open('$REPORT')); print(d.get('tdr',{}).get('remediation_cost_usd',0))" 2>/dev/null || echo "0")
          echo "debt-score=$GRADE" >> $GITHUB_OUTPUT
          echo "critical-count=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high-count=$HIGH" >> $GITHUB_OUTPUT
          echo "GRADE=$GRADE" >> $GITHUB_ENV
          echo "CRITICAL=$CRITICAL" >> $GITHUB_ENV
          echo "HIGH=$HIGH" >> $GITHUB_ENV
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "COST=$COST" >> $GITHUB_ENV
        fi

    - name: Write job summary
      shell: bash
      if: always()
      run: |
        cat >> $GITHUB_STEP_SUMMARY << EOF
        ## 🤖 CodeDebt Guardian Results

        | Metric | Value |
        |--------|-------|
        | Health Grade | **${GRADE:-N/A}** |
        | Total Issues | ${TOTAL:-0} |
        | 🔴 Critical | ${CRITICAL:-0} |
        | 🟠 High | ${HIGH:-0} |
        | Est. Debt Cost | \$${COST:-0} |

        EOF

    - name: Fail on critical issues
      shell: bash
      if: inputs.fail-on-critical == 'true'
      run: |
        if [ "${CRITICAL:-0}" -gt 0 ]; then
          echo "❌ FAILED: ${CRITICAL} CRITICAL issues found. Fix them before merging."
          exit 1
        fi
        echo "✅ No CRITICAL issues found."
