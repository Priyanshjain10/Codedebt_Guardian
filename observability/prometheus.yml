global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "codedebt-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "celery-workers"
    static_configs:
      - targets: ["worker:9100"]
    scrape_interval: 15s
    
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
